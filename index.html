<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
<title>Voyage — Travel Tracker</title>

<!-- PWA manifest + theme -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f3eed8" media="(prefers-color-scheme: light)" />
<meta name="description" content="Plan trips, track expenses, share with your crew — designed for Gulf travelers." />

<!-- iOS / Apple — standalone PWA -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Voyage" />
<meta name="format-detection" content="telephone=no" />
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
<link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
<link rel="shortcut icon" href="favicon.ico" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Tajawal:wght@300;400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Markazi+Text:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<style>
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(ellipse 60% 50% at 30% 20%, oklch(0.32 0.04 40) 0%, transparent 60%),
      radial-gradient(ellipse 80% 60% at 80% 100%, oklch(0.28 0.03 220) 0%, transparent 55%),
      #14110d;
    padding: 32px 16px;
  }
  /* Stage shadow under the device */
  .device-stage {
    position: relative;
    filter: drop-shadow(0 50px 60px rgba(0,0,0,0.6));
  }

  @media (max-width: 500px) {
    body {
      display: block;
      background: var(--cream);
      padding: 0;
      min-height: 100dvh;
      height: 100dvh;
      overflow: hidden;
      /* Lock body scrolling — inner #root scroll containers do the work */
      position: fixed;
      inset: 0;
    }
    #root {
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
    }
  }

  /* iOS: respect notch and home indicator */
  @supports (padding: env(safe-area-inset-top)) {
    body { padding-top: 0; padding-bottom: 0; }
  }

  /* ─────────────────────────────────────────────────────────────
     SPLASH — cinematic 2.5s cold-boot animation.
     Pure CSS, paints before any JSX is parsed. JS auto-dismisses
     after React mounts (with a 2500ms minimum show time).
     ───────────────────────────────────────────────────────────── */
  #splash {
    position: fixed; inset: 0; z-index: 9999;
    display: grid; place-items: center; overflow: hidden;
    background: #0a0f1e;
    color: #f5ecd9;
    transition: opacity 700ms cubic-bezier(.32,.72,0,1), visibility 0s linear 700ms;
    will-change: opacity;
  }
  #splash.splash-leave {
    opacity: 0; visibility: hidden; pointer-events: none;
  }

  /* Live aurora background — three blobs orbiting + breathing */
  .splash-aurora { position: absolute; inset: 0; pointer-events: none; }
  .splash-aurora b {
    position: absolute; display: block;
    border-radius: 50%; filter: blur(70px);
    will-change: transform, opacity;
  }
  .splash-aurora b:nth-child(1) {
    width: 70vw; height: 70vw; max-width: 560px; max-height: 560px;
    background: oklch(0.62 0.17 35); top: -25%; left: -20%;
    opacity: 0.55;
    animation: aur-drift-1 7s cubic-bezier(.45,.05,.55,.95) infinite alternate,
               aur-pulse  4s ease-in-out infinite alternate;
  }
  .splash-aurora b:nth-child(2) {
    width: 65vw; height: 65vw; max-width: 520px; max-height: 520px;
    background: oklch(0.55 0.18 260); bottom: -30%; right: -20%;
    opacity: 0.50;
    animation: aur-drift-2 8s cubic-bezier(.45,.05,.55,.95) infinite alternate,
               aur-pulse  5s ease-in-out 1s infinite alternate;
  }
  .splash-aurora b:nth-child(3) {
    width: 45vw; height: 45vw; max-width: 380px; max-height: 380px;
    background: oklch(0.50 0.14 320); top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.32;
    animation: aur-drift-3 9s cubic-bezier(.45,.05,.55,.95) infinite alternate,
               aur-pulse  6s ease-in-out 0.5s infinite alternate;
  }
  @keyframes aur-drift-1 { to { transform: translate(60px, 40px) scale(1.15); } }
  @keyframes aur-drift-2 { to { transform: translate(-50px, -40px) scale(1.20); } }
  @keyframes aur-drift-3 { to { transform: translate(-50%, -50%) translate(30px, -20px) scale(1.10); } }
  @keyframes aur-pulse { to { opacity: 0.75; } }

  /* Twinkling stars — 6 layered pseudo-elements via SVG-ish positions */
  .splash-stars {
    position: absolute; inset: 0; pointer-events: none; opacity: 0;
    animation: splash-fade-in 800ms ease-out 300ms forwards;
  }
  .splash-stars span {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 4px rgba(255,255,255,0.8);
    animation: twinkle 2.5s ease-in-out infinite;
  }
  .splash-stars span:nth-child(1) { top: 18%; left: 22%; animation-delay: 0s; }
  .splash-stars span:nth-child(2) { top: 32%; left: 78%; animation-delay: 0.4s; }
  .splash-stars span:nth-child(3) { top: 70%; left: 18%; animation-delay: 0.9s; }
  .splash-stars span:nth-child(4) { top: 75%; left: 82%; animation-delay: 0.2s; }
  .splash-stars span:nth-child(5) { top: 15%; left: 60%; animation-delay: 1.3s; }
  .splash-stars span:nth-child(6) { top: 85%; left: 50%; animation-delay: 0.7s; }
  .splash-stars span:nth-child(7) { top: 45%; left: 12%; animation-delay: 1.6s; }
  .splash-stars span:nth-child(8) { top: 55%; left: 90%; animation-delay: 0.5s; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; transform: scale(0.7); }
    50%      { opacity: 1;    transform: scale(1.4); }
  }

  /* Center stage */
  .splash-stage {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
    text-align: center;
  }

  /* ── SVG scene — the actual "video" ── */
  .splash-scene {
    width: 280px; height: 170px;
    opacity: 0;
    animation: scene-in 700ms cubic-bezier(.32,.72,0,1) 80ms forwards;
  }
  @keyframes scene-in {
    0%   { opacity: 0; transform: translateY(8px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* The dotted travel arc draws across */
  .scene-path {
    fill: none;
    stroke: rgba(245,236,217,0.45);
    stroke-width: 1.4;
    stroke-dasharray: 3 5;
    stroke-dashoffset: 0;
    stroke-linecap: round;
    /* Reveal the dashes left-to-right */
    animation: path-draw 1800ms cubic-bezier(.45,.05,.55,.95) 200ms both;
  }
  @keyframes path-draw {
    0%   { stroke-dashoffset: 320; }
    100% { stroke-dashoffset: 0; }
  }

  /* Origin + destination dots — pulse outward */
  .scene-pin {
    fill: #f5ecd9;
    transform-origin: center;
    transform-box: fill-box;
    opacity: 0;
    animation: pin-in 400ms cubic-bezier(.32,1.6,.4,1) forwards;
  }
  .scene-pin.dest { animation-delay: 1700ms; }
  .scene-pin.orig { animation-delay: 200ms; }
  @keyframes pin-in {
    0%   { opacity: 0; transform: scale(0); }
    60%  { opacity: 1; transform: scale(1.6); }
    100% { opacity: 1; transform: scale(1); }
  }
  .scene-pin-pulse {
    fill: none;
    stroke: rgba(245,236,217,0.7);
    stroke-width: 1;
    transform-origin: center;
    transform-box: fill-box;
    opacity: 0;
    animation: pin-pulse 1800ms ease-out infinite;
  }
  .scene-pin-pulse.orig { animation-delay: 0.6s; }
  .scene-pin-pulse.dest { animation-delay: 2.1s; }
  @keyframes pin-pulse {
    0%   { opacity: 0.8; transform: scale(0.8); }
    100% { opacity: 0;   transform: scale(3); }
  }

  /* The plane itself — travels along an invisible path via SMIL/CSS */
  .scene-plane {
    fill: #f5ecd9;
    /* offset-path follows the same curve as .scene-path */
    offset-path: path('M 30,120 Q 140,10 250,80');
    offset-distance: 0%;
    offset-rotate: auto;
    animation: plane-fly 1800ms cubic-bezier(.5,.0,.5,1) 200ms forwards;
    filter: drop-shadow(0 0 6px rgba(255,210,140,0.7));
  }
  @keyframes plane-fly {
    0%   { offset-distance: 0%;   opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 1; }
    100% { offset-distance: 100%; opacity: 1; }
  }

  /* Trail of fading sparkles behind the plane */
  .scene-trail {
    fill: oklch(0.85 0.12 60);
    offset-path: path('M 30,120 Q 140,10 250,80');
    offset-rotate: 0deg;
    opacity: 0;
  }
  .scene-trail.t1 { animation: trail-fly 1800ms ease-out  250ms forwards; }
  .scene-trail.t2 { animation: trail-fly 1800ms ease-out  450ms forwards; }
  .scene-trail.t3 { animation: trail-fly 1800ms ease-out  650ms forwards; }
  .scene-trail.t4 { animation: trail-fly 1800ms ease-out  850ms forwards; }
  @keyframes trail-fly {
    0%   { offset-distance: 0%;  opacity: 0; }
    20%  { opacity: 0.9; }
    100% { offset-distance: 100%; opacity: 0; }
  }

  /* Mountain silhouette at the bottom — slight scale-in */
  .scene-mountain {
    fill: rgba(20,15,30,0.55);
    transform-origin: bottom center;
    opacity: 0;
    animation: mtn-in 900ms cubic-bezier(.32,.72,0,1) 100ms forwards;
  }
  .scene-mountain.back { fill: rgba(40,30,55,0.45); animation-delay: 50ms; }
  @keyframes mtn-in {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Sun glow behind the path */
  .scene-sun {
    fill: oklch(0.85 0.14 50);
    opacity: 0;
    filter: blur(2px);
    animation: sun-rise 1200ms cubic-bezier(.32,.72,0,1) 200ms forwards,
               sun-pulse 3s ease-in-out 1400ms infinite;
  }
  @keyframes sun-rise {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 0.7; transform: translateY(0); }
  }
  @keyframes sun-pulse {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 0.85; }
  }

  /* Wordmark with shimmer pass */
  .splash-wordmark {
    font-family: 'Instrument Serif', Georgia, serif;
    font-style: italic;
    font-size: 60px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #f5ecd9;
    opacity: 0;
    background: linear-gradient(110deg,
      #f5ecd9 0%, #f5ecd9 40%,
      #ffd9a8 50%,
      #f5ecd9 60%, #f5ecd9 100%);
    background-size: 200% 100%;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-position: 100% 0;
    animation:
      wm-in 700ms cubic-bezier(.32,.72,0,1) 1900ms forwards,
      wm-shimmer 2.6s ease-out 2500ms infinite;
  }
  @keyframes wm-in {
    0%   { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes wm-shimmer {
    0%   { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* Tracking line that draws + glows */
  .splash-rule {
    position: relative; width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245,236,217,0.6), transparent);
    animation: rule-grow 700ms cubic-bezier(.32,.72,0,1) 2300ms forwards;
  }
  @keyframes rule-grow { to { width: 160px; } }

  /* Tagline + loading dots */
  .splash-tagline {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(245,236,217,0.78);
    opacity: 0;
    animation: tag-in 700ms cubic-bezier(.32,.72,0,1) 2600ms forwards;
  }
  @keyframes tag-in {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Animated loading dots beneath everything */
  .splash-dots {
    display: flex; gap: 6px; margin-top: 6px;
    opacity: 0;
    animation: tag-in 600ms ease-out 2900ms forwards;
  }
  .splash-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(245,236,217,0.85);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }
  .splash-dots span:nth-child(1) { animation-delay: 0s; }
  .splash-dots span:nth-child(2) { animation-delay: 0.18s; }
  .splash-dots span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes dot-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%           { transform: translateY(-7px); opacity: 1; }
  }

  /* Bottom progress bar fills the full 2.5s */
  .splash-progress {
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .splash-progress::after {
    content: ''; display: block; height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--clay, oklch(0.72 0.14 30)) 0%, oklch(0.78 0.12 35) 100%);
    box-shadow: 0 0 12px oklch(0.72 0.14 30 / 0.7);
    animation: bar-fill 3400ms cubic-bezier(.45,.05,.55,.95) forwards;
  }
  @keyframes bar-fill { to { width: 100%; } }

  @keyframes splash-fade-in { to { opacity: 1; } }

  /* Reduced motion — skip animations, show final state immediately */
  @media (prefers-reduced-motion: reduce) {
    #splash *,
    #splash::before, #splash::after {
      animation: none !important;
    }
    .splash-mark, .splash-wordmark, .splash-rule, .splash-tagline,
    .splash-dots, .splash-stars { opacity: 1; transform: none; }
    .splash-rule { width: 160px; }
    .splash-progress::after { width: 100%; }
    .splash-wordmark { -webkit-text-fill-color: #f5ecd9; background: none; }
  }
</style>
</head>
<body>
  <!-- Splash — pure CSS, paints before React loads. JS dismisses after mount. -->
  <div id="splash" aria-hidden="true">
    <div class="splash-aurora"><b></b><b></b><b></b></div>
    <div class="splash-stars">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="splash-stage">
      <!-- The mini animated travel scene — plane flying across a curved path
           over mountains, origin/destination pins, sun rising. -->
      <svg class="splash-scene" viewBox="0 0 280 170" xmlns="http://www.w3.org/2000/svg">
        <!-- Sun glow behind the path -->
        <ellipse class="scene-sun" cx="200" cy="105" rx="42" ry="42" />
        <!-- Distant mountain layer -->
        <path class="scene-mountain back"
              d="M 0,135 L 30,95 L 60,115 L 95,75 L 130,105 L 165,80 L 200,110 L 240,90 L 280,120 L 280,170 L 0,170 Z" />
        <!-- Front mountain layer -->
        <path class="scene-mountain"
              d="M 0,160 L 25,125 L 55,145 L 90,105 L 130,140 L 170,115 L 210,150 L 245,125 L 280,155 L 280,170 L 0,170 Z" />
        <!-- The dotted travel arc -->
        <path class="scene-path"
              d="M 30,120 Q 140,10 250,80"
              stroke-dasharray="320 0" />
        <!-- Origin pin (left) -->
        <circle class="scene-pin-pulse orig" cx="30" cy="120" r="4" />
        <circle class="scene-pin orig"       cx="30" cy="120" r="3.5" />
        <!-- Destination pin (right) -->
        <circle class="scene-pin-pulse dest" cx="250" cy="80" r="4" />
        <circle class="scene-pin dest"       cx="250" cy="80" r="3.5" />
        <!-- Sparkle trail (4 staggered dots that follow the plane's path) -->
        <circle class="scene-trail t1" r="1.6" />
        <circle class="scene-trail t2" r="1.2" />
        <circle class="scene-trail t3" r="0.9" />
        <circle class="scene-trail t4" r="0.7" />
        <!-- Plane silhouette traveling along the arc -->
        <g class="scene-plane">
          <path d="M -8,-2 L 8,0 L -8,2 L -5,0 Z" />
          <circle cx="0" cy="0" r="1.2" fill="rgba(255,255,255,0.9)" />
        </g>
      </svg>
      <div class="splash-wordmark">voyage</div>
      <div class="splash-rule"></div>
      <div class="splash-tagline">For people who wander</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="splash-progress"></div>
  </div>

  <div id="root">
    <!-- Hardcoded fallback: shown if React/Babel never mount within 8s.
         No DevTools required — user just taps a button. -->
    <div id="mount-fallback" style="display:none; position:fixed; inset:0;
         background:#f3eed8; color:#221c16; padding:24px;
         font-family:-apple-system, system-ui, sans-serif;
         display:none; place-items:center; text-align:center;">
      <div style="max-width:300px;">
        <div style="font-family:'Instrument Serif', Georgia, serif; font-style:italic; font-size:36px; margin-bottom:24px;">voyage</div>
        <div style="font-family:'Instrument Serif', Georgia, serif; font-size:22px; margin-bottom:8px;">Trouble loading</div>
        <div style="font-size:13px; color:#666; margin-bottom:20px; line-height:1.5;">
          Check your connection. If the issue continues, tap Reset.
        </div>
        <div style="display:flex; gap:8px; justify-content:center;">
          <button onclick="location.reload()" style="padding:12px 20px; border-radius:14px; border:0; background:#221c16; color:#f3eed8; font-weight:600; font-size:14px;">Reload</button>
          <button onclick="(async()=>{try{const n=await caches.keys();await Promise.all(n.map(x=>caches.delete(x)));const r=await navigator.serviceWorker.getRegistrations();await Promise.all(r.map(x=>x.unregister()));}catch(e){}finally{location.reload();}})()" style="padding:12px 20px; border-radius:14px; border:1px solid rgba(0,0,0,0.15); background:#fff; color:#221c16; font-weight:600; font-size:14px;">Reset</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    // ── Splash dismissal ──────────────────────────────────────
    // Minimum show time so the animation completes gracefully
    // (otherwise on fast networks the splash flashes for 200ms).
    // Maximum show time so a stuck app doesn't hide the splash forever.
    (function () {
      var SPLASH_MIN_MS = 3500;
      var SPLASH_MAX_MS = 8000;
      var mountedAt = Date.now();
      var splash = document.getElementById('splash');
      var dismissed = false;
      function hideSplash() {
        if (dismissed || !splash) return;
        dismissed = true;
        var elapsed = Date.now() - mountedAt;
        var wait = Math.max(0, SPLASH_MIN_MS - elapsed);
        setTimeout(function () { splash.classList.add('splash-leave'); }, wait);
      }
      // Expose so React can call it the moment its first screen renders
      window.__hideSplash = hideSplash;
      // Safety net: dismiss after MAX_MS no matter what
      setTimeout(hideSplash, SPLASH_MAX_MS);
    })();

    // If React hasn't mounted into #root within 8s, show the fallback.
    window._mountTimer = setTimeout(() => {
      const root = document.getElementById('root');
      // Heuristic: an unmounted #root has only our fallback child OR is empty
      if (root && root.children.length <= 1) {
        const fb = document.getElementById('mount-fallback');
        if (fb) fb.style.display = 'grid';
      }
    }, 8000);
  </script>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin="anonymous"></script>

  <!-- React + Babel pinned -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Local components -->
  <script type="text/babel" src="i18n.jsx"></script>

  <!-- ── PWA: service worker + install prompt ── -->
  <script>
    // Register service worker + auto-update flow.
    // Critical for production: when a new SW is deployed, users on the old
    // version must NOT get stuck. We listen for the new SW activating
    // and reload the page once (guarded by a flag to prevent infinite loops).
    if ('serviceWorker' in navigator &&
        (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' });

          // If a new SW takes control of this page → reload once so user gets fresh assets
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            refreshing = true;
            location.reload();
          });

          // Check for updates every time the tab regains focus / every 5 min
          const checkForUpdate = () => reg.update().catch(() => {});
          window.addEventListener('focus', checkForUpdate);
          setInterval(checkForUpdate, 5 * 60 * 1000);

          // Listen for an updated SW that's waiting to take over → notify + skip waiting
          reg.addEventListener('updatefound', () => {
            const installing = reg.installing;
            if (!installing) return;
            installing.addEventListener('statechange', () => {
              if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                // New version installed alongside the current one — activate it immediately
                window.toast?.('Updating to latest version…', 'info');
                installing.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        } catch (err) {
          console.warn('SW registration failed:', err);
        }
      });
    }

    // Capture the install prompt so we can trigger it from a UI button
    window._deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window._deferredInstallPrompt = e;
      // Let React listen for this
      window.dispatchEvent(new CustomEvent('voyage:install-available'));
    });
    window.addEventListener('appinstalled', () => {
      window._deferredInstallPrompt = null;
      window.toast?.('Voyage installed', 'success');
    });

    // Detect iOS Safari (no beforeinstallprompt support — needs manual instructions)
    window.isIOSStandalone = () => window.navigator.standalone === true;
    window.isIOS = () => /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  </script>
</body>
</html>
